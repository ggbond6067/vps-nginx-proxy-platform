services:
  nginx-gateway:
    image: nginx:1.27-alpine
    container_name: nginx-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certs:/etc/nginx/certs:ro
    networks:
      - proxy_net

  cert-agent:
    image: neilpang/acme.sh:3
    container_name: cert-agent
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      - CF_Token=${CF_API_TOKEN:-}
      - CF_Zone_ID=${CF_ZONE_ID:-}
    volumes:
      - ./acme:/acme.sh
      - ./certs:/certs
    command: daemon
    networks:
      - proxy_net

  proxy-panel:
    build:
      context: ./panel
    container_name: proxy-panel
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PANEL_PORT:-18080}:18080"
    env_file:
      - ./.env
    environment:
      - NGINX_CONTAINER_NAME=${NGINX_CONTAINER_NAME:-nginx-gateway}
      - CERT_AGENT_CONTAINER_NAME=${CERT_AGENT_CONTAINER_NAME:-cert-agent}
      - ROUTES_FILE=/app/config/routes.json
      - NGINX_CONF_DIR=/app/nginx/conf.d
      - CERTS_DIR=/app/certs
      - PANEL_USER=${PANEL_USER:-}
      - PANEL_PASSWORD=${PANEL_PASSWORD:-}
      - VPS_PUBLIC_IP=${VPS_PUBLIC_IP:-}
      - CF_API_TOKEN=${CF_API_TOKEN:-}
      - CF_ZONE_ID=${CF_ZONE_ID:-}
      - CF_PROXIED=${CF_PROXIED:-true}
      - CF_TTL=${CF_TTL:-1}
    volumes:
      - ./panel/config:/app/config
      - ./nginx/conf.d:/app/nginx/conf.d
      - ./certs:/app/certs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - nginx-gateway
      - cert-agent
    networks:
      - proxy_net

networks:
  proxy_net:
    name: proxy_net
